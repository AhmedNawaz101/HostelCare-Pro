<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/app.js"></script>
</head>
<body>
<header><h2>Student Portal</h2></header>
<main>
  <div class="card">
    <h3>Submit Complaint</h3>
    <div class="row">
      <div style="flex:1; min-width:220px;">
        <label>Category</label>
        <select id="cat">
          <option value="MAINTENANCE">MAINTENANCE</option>
          <option value="NOISE">NOISE</option>
        </select>
      </div>
      <div style="flex:2; min-width:220px;">
        <label>Description</label>
        <textarea id="desc" rows="3"></textarea>
      </div>
    </div>
    <div style="margin-top:12px; display:flex; gap:8px;">
      <button onclick="submitComplaint()">Submit</button>
      <button class="secondary" onclick="loadComplaints()">Load My Complaints</button>
      <button class="secondary" onclick="loadNotices()">Load Notices</button>
    </div>
  </div>

  <div class="card">
    <h3>Chat (Student ↔ Warden)</h3>
    <div class="row">
      <div style="flex:1; min-width:220px;">
        <label>Warden username</label>
        <input id="chatTo" value="warden1" />
      </div>
      <div style="flex:2; min-width:220px;">
        <label>Message</label>
        <input id="chatMsg" placeholder="Type message..." />
      </div>
    </div>
    <div style="margin-top:12px; display:flex; gap:8px;">
      <button onclick="sendMsg()">Send</button>
      <button class="secondary" onclick="loadConversation()">Load Conversation</button>
    </div>
  </div>

  <div class="card">
    <h3>Output</h3>
    <pre id="out"></pre>
  </div>
</main>

<script>
  async function submitComplaint() {
    try {
      const res = await apiFetch('/api/student/complaints', {
        method: 'POST',
        body: JSON.stringify({
          category: document.getElementById('cat').value,
          description: document.getElementById('desc').value
        })
      });
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }

  async function loadComplaints() {
    try {
      const res = await apiFetch('/api/student/complaints');
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }

  async function loadNotices() {
    try {
      const res = await apiFetch('/api/student/notices?audience=ALL');
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }

  async function sendMsg() {
    try {
      const res = await apiFetch('/api/student/messages', {
        method: 'POST',
        body: JSON.stringify({
          toUsername: document.getElementById('chatTo').value,
          content: document.getElementById('chatMsg').value
        })
      });
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }

  async function loadConversation() {
    try {
      const other = document.getElementById('chatTo').value;
      const res = await apiFetch(`/api/student/messages/${other}`);
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }
</script>
</body>
</html>
