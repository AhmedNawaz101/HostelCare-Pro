<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/app.js"></script>
</head>
<body>
<header><h2>Admin Dashboard</h2></header>
<main>
  <div class="card">
    <h3>Logs</h3>
    <button onclick="loadLogs()">Load Logs</button>
  </div>

  <div class="card">
    <h3>Monthly Report</h3>
    <div class="row">
      <div style="flex:1; min-width:200px;">
        <label>Year</label>
        <input id="year" value="2025" />
      </div>
      <div style="flex:1; min-width:200px;">
        <label>Month (1-12)</label>
        <input id="month" value="12" />
      </div>
    </div>
    <div style="margin-top:12px;">
      <button onclick="generateReport()">Generate Monthly Report</button>
    </div>
  </div>

  <div class="card">
    <h3>Output</h3>
    <pre id="out"></pre>
  </div>
</main>

<script>
  async function loadLogs() {
    try {
      const res = await apiFetch('/api/admin/logs');
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }

  async function generateReport() {
    try {
      const year = document.getElementById('year').value;
      const month = document.getElementById('month').value;
      const res = await apiFetch(`/api/admin/reports/monthly?year=${encodeURIComponent(year)}&month=${encodeURIComponent(month)}`);
      setOutput('out', res);
    } catch (e) {
      setOutput('out', { error: e.message });
    }
  }
</script>
</body>
</html>
